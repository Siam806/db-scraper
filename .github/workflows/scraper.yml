name: Scheduled Scraper

on:
  schedule:
    - cron: '0 0 * * 1'
    - cron: '0 0 * * 3'
    - cron: '0 0 * * 5'
    - cron: '0 0 * * 6'
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SCORELINES_TABLE: ${{ secrets.SUPABASE_SCORELINES_TABLE }}
          SUPABASE_STATISTICS_TABLE: ${{ secrets.SUPABASE_STATISTICS_TABLE }}
        run: npm run scrape
